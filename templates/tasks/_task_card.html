<a href="{% url 'tasks:detail' task_id=task.pk %}"
   class="block bg-gray-700 hover:bg-gray-650 rounded-lg p-3 transition-colors group border border-gray-600 hover:border-indigo-600">
  <p class="text-sm font-medium text-white group-hover:text-indigo-300 transition-colors line-clamp-2 mb-2">
    {{ task.title }}
  </p>
  <div class="flex items-center justify-between">
    <span class="badge {% if task.priority == 'high' %}bg-red-900 text-red-300{% elif task.priority == 'medium' %}bg-yellow-900 text-yellow-300{% else %}bg-gray-600 text-gray-400{% endif %}">
      {{ task.priority }}
    </span>
    {% if task.assigned_to %}
    <div class="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold" title="{{ task.assigned_to.username }}">
      {{ task.assigned_to.username|first|upper }}
    </div>
    {% endif %}
  </div>
  {% if task.due_date %}
  <p class="text-xs text-gray-500 mt-1.5">📅 {{ task.due_date }}</p>
  {% endif %}
</a>
